name: Update FCC Band License Map

on:
  workflow_dispatch:        # Triggered by server cron or manually from GitHub UI

jobs:
  update-band-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Snapshot current JSON for diff
        run: |
          mkdir -p app/src/main/assets
          cp app/src/main/assets/band_license_map.json /tmp/band_license_map.before.json 2>/dev/null || echo '{}' > /tmp/band_license_map.before.json

      - name: Download FCC bulk ZIPs
        run: |
          mkdir -p .fcc_cache
          echo "Downloading l_cell.zip..."
          curl -fsSL --max-time 300 \
            "https://data.fcc.gov/download/pub/uls/complete/l_cell.zip" \
            -o l_cell.zip
          echo "Downloading l_market.zip..."
          curl -fsSL --max-time 600 \
            "https://data.fcc.gov/download/pub/uls/complete/l_market.zip" \
            -o l_market.zip

      - name: Download FCC auction CSVs
        run: |
          echo "Auction 107 (C-Band)..."
          curl -fsSL --max-time 60 \
            "https://auctiondata.fcc.gov/public/projects/auction107/reports/results_by_license/download" \
            -o .fcc_cache/a107_results.csv

          echo "Auction 108 (2.5 GHz)..."
          curl -fsSL --max-time 60 \
            "https://auctiondata.fcc.gov/public/projects/auction108/reports/results_by_license/download" \
            -o .fcc_cache/a108_results.csv

          echo "Auction 110 (3.45 GHz)..."
          curl -fsSL --max-time 60 \
            "https://auctiondata.fcc.gov/public/projects/auction110/reports/results_by_license/download" \
            -o .fcc_cache/a110_results.csv

      - name: Run band license map builder
        run: python build_band_license_map.py --local-cell l_cell.zip --local-market l_market.zip

      - name: Check for changes
        id: diff
        run: |
          if diff -q /tmp/band_license_map.before.json \
              app/src/main/assets/band_license_map.json > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to band_license_map.json"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "band_license_map.json has changed"
            diff /tmp/band_license_map.before.json \
              app/src/main/assets/band_license_map.json | head -40 || true
          fi

      - name: Commit and push updated JSON
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/assets/band_license_map.json
          git commit -m "chore: update band_license_map.json from FCC weekly data [skip ci]"
          git push

      - name: Push to cellfire.io via cPanel
        if: steps.diff.outputs.changed == 'true'
        env:
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          python - << 'EOF'
          import json, urllib.request, urllib.parse, os

          CPANEL_HOST = "just2029.justhost.com"
          CPANEL_PORT = 2083
          CPANEL_USER = "veterap2"
          SERVER_DIR  = "/home1/veterap2/public_html/website_9695cd55/files/cellfire-db"
          API_TOKEN   = os.environ["CPANEL_TOKEN"]

          fname = "band_license_map.json"
          with open(f"app/src/main/assets/{fname}", encoding="utf-8") as f:
              content = f.read()

          url  = f"https://{CPANEL_HOST}:{CPANEL_PORT}/execute/Fileman/save_file_content"
          data = urllib.parse.urlencode({
              "dir":        SERVER_DIR,
              "filename":   fname,
              "content":    content,
              "from_charset": "UTF-8",
              "to_charset":   "UTF-8",
          }).encode("utf-8")

          req = urllib.request.Request(url, data=data, method="POST")
          req.add_header("Authorization", f"cpanel {CPANEL_USER}:{API_TOKEN}")

          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
          if result.get("status") == 1:
              print(f"Pushed {fname} to cellfire.io")
          else:
              print(f"Push failed: {result}")
              exit(1)
          EOF

      - name: Clean up large ZIPs
        if: always()
        run: |
          rm -f l_cell.zip l_market.zip
          echo "ZIPs removed"

      - name: Post Slack notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          python - << 'EOF'
          import json, urllib.request, os, sys

          webhook = os.environ.get("SLACK_WEBHOOK", "")
          if not webhook:
              print("No SLACK_WEBHOOK configured, skipping")
              sys.exit(0)

          changed = "${{ steps.diff.outputs.changed }}" == "true"
          run_url = "https://github.com/veteranop/cellfire/actions/workflows/fcc-band-update.yml"

          if changed:
              try:
                  with open("/tmp/band_license_map.before.json") as f:
                      before = json.load(f)
                  with open("app/src/main/assets/band_license_map.json") as f:
                      after = json.load(f)

                  added   = sorted(set(after) - set(before))
                  removed = sorted(set(before) - set(after))
                  updated = sorted(s for s in set(after) & set(before) if after[s] != before[s])

                  lines = []
                  if added:
                      lines.append(f"• New states added: {', '.join(added)}")
                  if removed:
                      lines.append(f"• States removed: {', '.join(removed)}")
                  if updated:
                      preview = ", ".join(updated[:12]) + ("…" if len(updated) > 12 else "")
                      lines.append(f"• {len(updated)} state(s) updated: {preview}")

                  detail = "\n".join(lines) if lines else "• Data refreshed (structure unchanged)"
              except Exception as e:
                  detail = f"• Changes detected (diff parse error: {e})"

              msg = {
                  "text": f":satellite: *FCC Band License Map Updated*\n{detail}\n<{run_url}|View workflow run>"
              }
          else:
              msg = {
                  "text": f":white_check_mark: *FCC Band Update* — No FCC changes detected this week. Map is current.\n<{run_url}|View workflow run>"
              }

          data = json.dumps(msg).encode()
          req  = urllib.request.Request(webhook, data=data, method="POST")
          req.add_header("Content-Type", "application/json")
          with urllib.request.urlopen(req) as r:
              print(f"Slack notification sent: HTTP {r.status}")
          EOF

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.changed }}" == "true" ]; then
            echo "band_license_map.json was updated and pushed to cellfire.io"
          else
            echo "No FCC changes detected this week — nothing to push"
          fi
